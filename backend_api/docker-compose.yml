version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: samanyudu_db
    restart: always
    environment:
      POSTGRES_USER: samanyudu_user
      POSTGRES_PASSWORD: your_secure_password
      POSTGRES_DB: samanyudu_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build: .
    container_name: samanyudu_app
    restart: always
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgres://samanyudu_user:your_secure_password@db:5432/samanyudu_db
      - USE_LOCAL=false
      - PORT=5000
    ports:
      - "5000:5000"
    volumes:
      - ./uploads:/app/uploads

volumes:
  postgres_data:
