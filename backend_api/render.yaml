services:
  - type: web
    name: samanyudu-backend
    runtime: docker
    plan: free
    rootDir: backend_api
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: samanyudu-db
          property: connectionString
      - key: PORT
        value: 5000
      - key: USE_LOCAL
        value: "false"
      - key: CLOUDFLARE_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        value: samanyudu-media
      - key: R2_PUBLIC_DOMAIN
        value: cdn.samanyudutv.com
      - key: SMTP_HOST
        value: smtp-relay.brevo.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: samanyudutvapp@gmail.com
      - key: AUTHKEY_API_KEY
        sync: false
      - key: AUTHKEY_SID
        sync: false

databases:
  - name: samanyudu-db
    plan: free
